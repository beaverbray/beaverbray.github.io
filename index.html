<html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jake Bray</title>
    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #131316;
    }

    /* Style the side navigation */
    .sidenav {
      height: 100%;
      width: 150px;
      position: fixed;
      z-index: 1;
      top: 10;
      left: 0;
      background-color: #2F3239;
      overflow-x: hidden;
      padding-left: 0px
    }


    /* Side navigation links */
    .sidenav a {
      color: F5E2C8;
      padding: 32px;
      text-decoration: none;
      display: block;
      text-align: center;

    }

    /* Change color on hover */
    .sidenav a:hover {
      background-color: #475D92;
      color: F5E2C8;
    }

    /* Style the content */
    .content {
      margin-left: 150px;
      padding-left: 30px;

    }
    </style>
    </head>
    <body>

      <nav>
        <ul class="sidenav">
          <li><a href="https://beaverbray.github.io/">Home</a></li>
          <li><a href="https://beaverbray.github.io/contact">Contact</a></li>
          <li><a href="https://beaverbray.github.io/projects">Projects</a></li>
        </ul>
      </nav>

    <div class="content">
      <h1>Jake Bray</h1>
      <p>A full-height, fixed sidenav and content.</p>
    </div>

    </body>
    </html>
